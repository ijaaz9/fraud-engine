spring:
  application:
    name: fraud-detection

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:frauddb}
    username: ${POSTGRES_USER:fraud}
    password: ${POSTGRES_PASSWORD:fraud}
    hikari:
      # Connection pool sizing — tune based on expected query concurrency
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000   # 30s
      idle-timeout: 600000        # 10 min
      max-lifetime: 1800000       # 30 min
      pool-name: FraudDetectionHikariPool

  jpa:
    hibernate:
      # Liquibase manages the schema — Hibernate must not interfere
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    # Log SQL in development (set to false in production)
    show-sql: false

  # ── Liquibase ───────────────────────────────────────────────────────────────
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          min-idle: 2
          max-idle: 10
          max-active: 20
          max-wait: 2000ms    # Block max 2s waiting for a connection

  # ── Kafka ───────────────────────────────────────────────────────────────────
  # NOTE: This project does NOT use Spring Boot's Kafka auto-configuration.
  # The consumer/producer/admin are wired manually in KafkaConfig and bind the
  # application-owned `fraud.kafka.*` properties below — not `spring.kafka.*`.
  # Consumer details (offset reset, manual ack, deserializers) are set in code.

# ── Fraud Detection Rule Configuration ──────────────────────────────────────
# All thresholds and scores are externalised here so they can be tuned
# without recompiling or redeploying the application.
fraud:
  idempotency:
    ttl-hours: 24

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: fraud-detection-group
    concurrency: 3             # Consumer threads — should not exceed partition count
    topic:
      transactions: transactions

  rules:
    velocity:
      threshold: 10           # Max transactions allowed in the window
      window-seconds: 300     # 5-minute rolling window
      score: 40               # Score contribution when this rule fires

    high-amount:
      threshold: 10000        # Amounts above this (in transaction currency) are flagged
      score: 30

    geo-anomaly:
      location-ttl-hours: 24  # How long to retain last-known-location in Redis
      score: 15               # Lower weight — flags location change, not impossibility
      distance-threshold-km: 500

    impossible-travel:
      max-speed-kmh: 1200     # Faster than any commercial aircraft (~900 km/h cruise)
        # with headroom for GPS imprecision. Tune to ~900 for
      # stricter detection at the cost of more false positives.
      min-elapsed-seconds: 60 # Ignore speed when transactions are too close in time
      # (guards against GPS noise on near-simultaneous transactions)
      score: 60               # High weight — physically impossible travel is a strong signal

    duplicate:
      window-seconds: 120     # 2-minute duplicate detection window
      score: 25

# ── Actuator (Health + Metrics) ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    kafka:
      enabled: true
    db:
      enabled: true

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.frauddetection: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN
    org.springframework.boot.autoconfigure: DEBUG
    liquibase: DEBUG